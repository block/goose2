pre-commit:
  commands:
    format:
      glob: "*.{js,jsx,ts,tsx,json,css}"
      run: npx biome format --write {staged_files} && npx biome check --fix {staged_files} && git add {staged_files}
    check:
      run: just check

pre-push:
  parallel: true
  commands:
    fmt-check:
      run: just fmt-check
    clippy:
      run: just clippy
    check:
      run: just check
    test:
      run: just test
    build:
      run: just build
    tauri-check:
      run: just tauri-check
